<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script>
(function () {

  const APP_URL = "https://m5rdev.github.io/MuslimEncyclopedia";
  const ONLINE_URL = "https://m5rdev.github.io/MuslimEncyclopedia-online";

  let raw = decodeURIComponent(location.pathname || "");

  // =========================
  // 🔧 NORMALIZE
  // =========================

  function normalize(text) {
    return text
      .toLowerCase()
      .trim()
      .replace(/[\s\-_./]+/g, "")
      .replace(/[أإآ]/g, "ا")
      .replace(/ى/g, "ي")
      .replace(/ة/g, "ه")
      .replace(/ؤ/g, "و")
      .replace(/ئ/g, "ي")
      .replace(/[^\w\u0600-\u06FF]/g, "");
  }

  function splitWords(text) {
    return text
      .toLowerCase()
      .split(/[\s\-_./]+/)
      .map(w => normalize(w))
      .filter(Boolean);
  }

  let clean = normalize(raw);
  let words = splitWords(raw);

  // =========================
  // 🎯 KEYWORDS
  // =========================

  const MUSLIM_KEYS = [
    "muslim","islam","quran","hadith","deen","islamic",
    "encyclopedia","muslimencyclopedia",
    "muslimapp","islamapp",
    "موسوعه","المسلم","اسلام","دين"
  ];

  const ONLINE_KEYS = [
    "online","اونلاين","انلاين","live","مباشر","لايف","web"
  ];

  // =========================
  // 🚀 SMART DETECTION
  // =========================

  function containsAny(words, keys) {
    return words.some(w =>
      keys.some(k => w.includes(normalize(k)))
    );
  }

  function isMuslimRelated() {
    return containsAny(words, MUSLIM_KEYS) || clean.includes("muslim");
  }

  function isOnlineExplicit() {
    return containsAny(words, ONLINE_KEYS);
  }

  // =========================
  // 🧠 DECISION (ذكي)
  // =========================

  // 1️⃣ إذا ليس له علاقة بالموسوعة → التطبيق
  if (!isMuslimRelated()) {
    location.replace(APP_URL);
    return;
  }

  // 2️⃣ إذا ذكر "اونلاين" بشكل صريح → أونلاين
  if (isOnlineExplicit()) {
    location.replace(ONLINE_URL);
    return;
  }

  // 3️⃣ غير ذلك → التطبيق
  location.replace(APP_URL);

})();
</script>
</head>
<body></body>
</html>
